<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stroop Victoria | ENSINO</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="stylesheet" href="../style-refined.css">
  <link rel="stylesheet" href="https://unpkg.com/jspsych@7.3.4/css/jspsych.css">
</head>
<body>
  <main class="experiment-shell">
    <div class="experiment-topbar">
      <a class="back-link" href="index.html">&larr; Voltar para ENSINO</a>
      <div class="pill" id="participant-badge">Sessão pendente</div>
    </div>
    <div class="experiment-host">
      <div id="jspsych-target">
        <div class="stroop-layout">
          <div class="stroop-frame">
            <h2>Carregando tarefa</h2>
            <p>Se esta mensagem permanecer na tela, houve falha no carregamento do experimento.</p>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script>window.__ensinoScriptErrors = [];</script>
  <script src="https://unpkg.com/jspsych@7.3.4" type="text/javascript" onerror="window.__ensinoScriptErrors.push('Falha ao carregar jsPsych principal.')"></script>
  <script src="https://unpkg.com/@jspsych/plugin-html-keyboard-response@1.1.3" type="text/javascript" onerror="window.__ensinoScriptErrors.push('Falha ao carregar plugin html-keyboard-response.')"></script>
  <script src="https://unpkg.com/@jspsych/plugin-call-function@1.1.2" type="text/javascript" onerror="window.__ensinoScriptErrors.push('Falha ao carregar plugin call-function.')"></script>
  <script src="https://unpkg.com/@jspsych/plugin-fullscreen@1.1.2" type="text/javascript" onerror="window.__ensinoScriptErrors.push('Falha ao carregar plugin fullscreen.')"></script>
  <script src="common.js"></script>
  <script src="stroop-victoria.js"></script>
</body>
</html>
